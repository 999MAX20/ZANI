name: Zani CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend checks and tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-with-32-plus-characters
      DEBUG: "False"
      ENVIRONMENT: development
      DATABASE_URL: sqlite:///db.sqlite3
      REDIS_URL: redis://localhost:6379/0
      AUTOMATIONS_RUN_INLINE: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173
      SUPPORT_REQUIRES_GRANT: "True"
      USE_S3: "False"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.txt
          pip install --require-hashes -r requirements-dev.txt

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Django system check
        run: python manage.py check

      - name: Production readiness audit JSON smoke
        run: python manage.py production_readiness_audit --format=json

      - name: Backend tests
        run: python manage.py test

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_URL: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend and widget
        run: npm run build

      - name: Check frontend bundle budget
        run: npm run check:bundle

      - name: Audit high-severity frontend dependencies
        run: npm audit --audit-level=high
